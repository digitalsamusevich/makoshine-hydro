name: Makoshine manual run

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browser and Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node fetch-makoshine.js

      - name: Show JSON result
        run: cat makoshine.json
