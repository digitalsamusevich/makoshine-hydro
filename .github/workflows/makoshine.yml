name: Makoshine manual run

on:
  workflow_dispatch:
  schedule:
    - cron: '17,47 * * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browser and Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node fetch-makoshine.js

      - name: Show JSON result
        run: cat desna-posts.json

      - name: Commit JSON to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add desna-posts.json desna-history.json
          git commit -m "update desna posts data" || echo "no changes"
          git push

      - name: Upload desna-posts.json
        uses: actions/upload-artifact@v4
        with:
          name: desna-posts-json
          path: desna-posts.json


