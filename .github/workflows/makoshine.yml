name: Makoshine scraper

on:
  workflow_dispatch:
  schedule:
    # Базові запуски
    - cron: '17,47 * * * *'

    # 08:30–09:30 (GMT+2) = 06:30–07:30 UTC кожні 5 хв
    - cron: '30-59/5 6 * * *'
    - cron: '0-30/5 7 * * *'

concurrency:
  group: makoshine-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node fetch-makoshine.js

      - name: Show result (debug)
        run: |
          echo "=== POSTS ==="
          cat desna-posts.json || echo "no posts file"
          echo "=== HISTORY ==="
          cat desna-history.json || echo "no history file"

      - name: Commit & push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Підтягнути останні зміни щоб уникнути конфліктів
          git pull --rebase

          # Додаємо файли якщо існують
          [ -f desna-posts.json ] && git add desna-posts.json
          [ -f desna-history.json ] && git add desna-history.json

          # Перевірка чи є зміни
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update desna posts data"
            git push
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desna-posts-json
          path: |
            desna-posts.json
            desna-history.json
          if-no-files-found: ignore
